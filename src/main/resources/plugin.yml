name: MachinaWards
main: com.machina.wards.MachinaWards
version: 1.4.0
api-version: 1.21
author: Machina
softdepend: [Vault]
commands:
  ward:
    description: Manage wards
    usage: /ward
permissions:
  wards.admin:
    description: Full admin access — bypass all protection, delete any ward
    default: op
  wards.place:
    description: Allows placing ward blocks
    default: true
  wards.player.*:
    description: Wildcard for tier-based ward limits (e.g. wards.player.3)
